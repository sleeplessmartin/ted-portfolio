<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#060c1a"/>

  <!-- Subtle cyan border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5.5"
        stroke="#0ab5d9" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- T — horizontal crossbar (white) -->
  <rect x="5" y="8" width="22" height="4" rx="1.5" fill="#dde5ef"/>

  <!-- T — vertical stem (cyan) -->
  <rect x="14" y="12" width="4" height="13" rx="1.5" fill="#0ab5d9"/>
</svg>
