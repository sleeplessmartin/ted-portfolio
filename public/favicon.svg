<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="hsl(222, 47%, 7%)"/>

  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="hsl(199, 89%, 48%)" stroke-opacity="0.25"/>

  <!-- T -->
  <text
    x="6"
    y="23"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="800"
    fill="hsl(213, 31%, 91%)"
    letter-spacing="-1"
  >T</text>

  <!-- H in cyan -->
  <text
    x="16"
    y="23"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="800"
    fill="hsl(199, 89%, 48%)"
    letter-spacing="-1"
  >H</text>

  <!-- Cyan dot accent bottom-right -->
  <circle cx="28" cy="27" r="2.5" fill="hsl(199, 89%, 48%)" opacity="0.8"/>
</svg>
